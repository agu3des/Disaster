<div class="login-container">
  <div class="login-form">
    <h2 class="form-title">Login</h2>
    
    <form  class="form" id="loginForm" (ngSubmit)="onLoginSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" [(ngModel)]="email" required class="form-input">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" [(ngModel)]="password" required class="form-input">
      </div>
      
      <button type="submit" class="submit-button" id="submitButton">Login</button>
      
      <div id="google-btn" style="margin-top: 15px; display: flex; justify-content: center;"></div>
    </form>
    
    <p class="register-link">
      Don't have an account? <a [routerLink]="['/app-login']" (click)="openRegisterModal()" style="cursor: pointer;">Sign up</a>
    </p>
  </div>
</div>
