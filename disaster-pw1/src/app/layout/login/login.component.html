<div class="modal-overlay" *ngIf="isModalOpen">
  <div class="modal-content">
    
    <button (click)="closeModal()" class="close-btn">X</button>

    <div *ngIf="isLoginMode">
      <h2>Sign In</h2>
      
      <input type="email" placeholder="Email" [(ngModel)]="email">
      <input type="password" placeholder="Password" [(ngModel)]="password">
      
      <button (click)="onLoginSubmit()">Login</button>

      <p>Don't have an account? 
        <a href="javascript:void(0)" (click)="toggleMode()">Sign up</a>
      </p>
    </div>

    <div *ngIf="!isLoginMode">
      <h2>Sign Up</h2>
      
      <input type="text" placeholder="Full Name" [(ngModel)]="name"> 
      <input type="email" placeholder="Email" [(ngModel)]="email">
      <input type="password" placeholder="Password" [(ngModel)]="password">
      
      <button (click)="onRegisterSubmit()">Register</button>

      <p>Already have an account? 
        <a href="javascript:void(0)" (click)="toggleMode()">Log in</a>
      </p>
    </div>

    <hr>
    <div class="google-container">
      <p>Or continue with Google</p>
      <div id="google-btn"></div> 
    </div>

  </div>
</div>
